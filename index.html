<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>𝕏 Arşivi Zaman Matrisi</title>
    <style>
        /* 🎯 USER OPTIMIZED PREMIUM DARK PALETTE */
        :root { 
            --x-blue: #1d9bf0; 
            --bg: #28283a; 
            --card: #363641; 
            --card-subtle: #141416;
            --border: #27272a; 
            --border-subtle: #202023;
            --text: #f4f4f5; 
            --text-muted: #a1a1aa;
            --bezier: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Neon Emerald Glow Matrix */
            --green-glow: rgba(16, 185, 129, 0.25);
            --green-border: rgba(16, 185, 129, 0.45);
            --green-text: #34d399;
            --green-bg: rgba(16, 185, 129, 0.12);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* 🎯 GLASSMORPHISM HEADER */
        header { 
            background: rgba(40, 40, 58, 0.8); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            width: 100%; 
            padding: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            box-sizing: border-box; 
        }
        header h2 { margin: 0; font-size: 17px; font-weight: 800; text-align: center; letter-spacing: -0.4px; color: var(--text); }
        
        .header-controls { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
        #record-counter { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.2px; }
        
        #active-tags-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 800px; width: 100%; }
        .tag-chip { 
            background: rgba(29, 155, 240, 0.1); 
            color: #38bdf8; 
            border: 1px solid rgba(29, 155, 240, 0.3); 
            padding: 3px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.2s var(--bezier); 
        }
        .tag-chip .remove-btn { cursor: pointer; font-size: 14px; font-weight: bold; color: var(--text-muted); }
        .tag-chip .remove-btn:hover { color: #f43f5e; }

        button { 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            background: #27272a; 
            color: var(--text);
            font-weight: 700; 
            cursor: pointer; 
            font-size: 12px; 
            transition: all 0.2s var(--bezier); 
            outline: none; 
        }
        button:hover { background: #3f3f46; border-color: #52525b; }
        button.active { background: var(--x-blue); color: #fff; border-color: var(--x-blue); }

        /* 🎯 TIMELINE VIEWPORT LAYOUT */
        #matrix-viewport { width: 100%; max-width: 800px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 25px; }
        
        .month-wrapper { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
        }
        .month-title { 
            margin-top: 0; 
            margin-bottom: 15px; 
            color: var(--text); 
            font-size: 16px; 
            font-weight: 800;                        
            border-bottom: 1px solid var(--border-subtle); 
            padding-bottom: 8px; 
            letter-spacing: -0.2px;
        }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { text-align: center; font-weight: 700; color: var(--text-muted); padding: 3px 0; font-size: 12px; }
        
        /* 🎯 MUTLAK KONUMLANDIRMA TABANLI GÜN HÜCRESİ */
        .day-cell { 
            background: var(--card-subtle); 
            border: 1px solid var(--border-subtle); 
            border-radius: 8px; 
            min-height: 68px; 
            position: relative; 
            box-sizing: border-box;
            overflow: hidden;
        }
        .day-cell.empty { background: transparent; border: none; }
        
        .day-num { 
            position: absolute;
            top: 6px;
            left: 8px;
            z-index: 10; 
            font-weight: 700; 
            font-size: 12px; 
            color: var(--text-muted); 
            pointer-events: none; 
        }
        .day-cell.today { border-color: rgba(29, 155, 240, 0.4); background: rgba(29, 155, 240, 0.02); }
        .day-cell.today .day-num { color: var(--x-blue); }
        
        /* 🎯 IMMERSIVE BUTONLAR - KOMPLE KAPLAMA MİMARİSİ */
        .post-badge { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s var(--bezier); 
            box-sizing: border-box; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 14px; 
        }
        
        .post-badge.single-link { 
            background: rgba(29, 155, 240, 0.1); 
            color: #38bdf8;
            border: 1px solid rgba(29, 155, 240, 0.2);
        }
        .post-badge.single-link:hover { 
            background: var(--x-blue); 
            color: #fff;
            border-color: var(--x-blue);
            box-shadow: 0 0 14px rgba(29, 155, 240, 0.4);
        }
        
        .post-badge.multiple { 
            background: var(--green-bg); 
            color: var(--green-text);
            border: 1px solid var(--green-border);
            box-shadow: 0 0 8px var(--green-glow), inset 0 0 6px rgba(16, 185, 129, 0.15);
        }
        .post-badge.multiple:hover { 
            background: #10b981; 
            color: #ffffff;
            border-color: #10b981;
            transform: scale(1.02);
            box-shadow: 0 0 16px rgba(16, 185, 129, 0.6), inset 0 0 4px rgba(255, 255, 255, 0.2);
        }
        
        /* MODAL CORES WITH FLEX ALIGNMENT */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; width: 85%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); box-sizing: border-box; max-height: 75vh; overflow-y: auto; margin: 0; color: var(--text); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; font-size: 15px; font-weight: 800; }
        .modal-close { border: none; background: transparent; font-size: 22px; cursor: pointer; color: var(--text-muted); }
        .modal-close:hover { color: var(--text); }
        
        .links-list { display: flex; flex-direction: column; gap: 10px; }
        .x-link-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #27272a; color: var(--text); border: 1px solid var(--border); text-decoration: none; padding: 12px; border-radius: 30px; font-weight: 700; font-size: 13px; text-align: center; transition: all 0.2s var(--bezier); }
        .x-link-btn:hover { background: #fff; color: #000; transform: translateY(-1px); }
        
        .tag-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .modal-tag-btn { margin: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-subtle); color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s var(--bezier); }
        .modal-tag-btn:hover { border-color: #52525b; color: var(--text); }
        .modal-tag-btn.active { background: var(--x-blue); color: white; border-color: var(--x-blue); }
        
        input[type="text"] { width: 100%; padding: 10px 16px; margin-bottom: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-subtle); color: var(--text); box-sizing: border-box; font-size: 13px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--x-blue); }

        /* 🎯 ADAPTIVE COMPACT PHONE INTERFACE */
        @media (max-width: 600px) { 
            header { padding: 8px 10px; gap: 4px; }
            header h2 { font-size: 13px; }
            .header-controls { gap: 8px; }
            button { padding: 4px 12px; font-size: 11px; border-radius: 12px; }
            #record-counter { font-size: 11px; }
            .tag-chip { padding: 2px 8px; font-size: 10px; border-radius: 8px; }
            
            #matrix-viewport { gap: 14px; padding: 8px 4px; }
            .month-wrapper { padding: 12px; border-radius: 12px; }
            .month-title { font-size: 13px; margin-bottom: 8px; padding-bottom: 4px; }
            .calendar-grid { gap: 4px; }
            .weekday { font-size: 11px; padding: 1px 0; }
            
            .day-cell { min-height: 46px; border-radius: 6px; }
            .day-num { font-size: 10px; top: 3px; left: 5px; } 
            .post-badge { font-size: 9px; padding-top: 10px; border-radius: 6px; } 
        }
    </style>
</head>

</div>

    function renderContinuousMatrix() {
        const viewport = document.getElementById("matrix-viewport");
        viewport.innerHTML = "";

        const filteredCount = rawData.filter(function(item) {
            if (selectedTags.length > 0) {
                return selectedTags.every(function(t) { return item.t.includes(t); });
            }
            return true;
        }).length;

        const counterEl = document.getElementById("record-counter");
        if (counterEl) {
            if (selectedTags.length > 0) {
                counterEl.innerHTML = filteredCount + ' / ' + rawData.length;
            } else {
                counterEl.innerHTML = 'Toplam: ' + rawData.length;
            }
        }

        if (rawData.length === 0) {
            viewport.innerHTML = "<div style='text-align:center; padding:20px; color:var(--text-muted);'>Arşivde veri bulunamadı.</div>";
            return;
        }

        const minDate = new Date(rawData[0].d);
        const maxDate = new Date(rawData[rawData.length - 1].d);
        
        let startYear = minDate.getFullYear();
        let startMonth = minDate.getMonth();
        let endYear = maxDate.getFullYear();
        let endMonth = maxDate.getMonth();

        let y = startYear;
        let m = startMonth;

        while (y < endYear || (y === endYear && m <= endMonth)) {
            
            const monthStrStr = String(m + 1).padStart(2, "0");
            const monthPrefix = y + "-" + monthStrStr;
            
            const monthPostsCount = rawData.filter(function(item) {
                const isCurrentMonth = item.d.startsWith(monthPrefix);
                if (!isCurrentMonth) { return false; }
                if (selectedTags.length > 0) {
                    return selectedTags.every(function(t) { return item.t.includes(t); });
                }
                return true;
            }).length;

            if (monthPostsCount === 0) {
                m++; 
                if (m > 11) { m = 0; y++; } 
                continue;
            }
            
            let monthWrapper = document.createElement("div");
            monthWrapper.className = "month-wrapper";

            let title = document.createElement("div");
            title.className = "month-title";
            title.innerText = monthsTr[m] + " " + y + " (" + monthPostsCount + " Gönderi)";
            monthWrapper.appendChild(title);

            let grid = document.createElement("div");
            grid.className = "calendar-grid";

            daysTr.forEach(function(day) {
                let dDiv = document.createElement("div"); dDiv.className = "weekday"; dDiv.innerText = day; grid.appendChild(dDiv);
            });

            let firstDayIndex = new Date(y, m, 1).getDay();
            firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const totalDays = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                let emptyCell = document.createElement("div"); emptyCell.className = "day-cell empty"; grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                let cell = document.createElement("div"); cell.className = "day-cell";
                let today = new Date(); if(today.getDate() === day && today.getMonth() === m && today.getFullYear() === y) { cell.classList.add("today"); }
                
                let numDiv = document.createElement("div"); numDiv.className = "day-num"; numDiv.innerText = day; cell.appendChild(numDiv);

                const targetDate = y + "-" + monthStrStr + "-" + String(day).padStart(2, "0");

                const matches = rawData.filter(function(item) {
                    if(item.d !== targetDate) { return false; }
                    if(selectedTags.length > 0) {
                        return selectedTags.every(function(t) { return item.t.includes(t); });
                    }
                    return true;
                });

                if (matches.length > 0) {
                    let btn = document.createElement("button");
                    btn.className = "post-badge";
                    
                    if (matches.length === 1) {
                        btn.classList.add("single-link"); btn.innerText = "🌐 Aç";
                        btn.onclick = function() { window.open(matches[0].u, "_blank"); };
                    } else {
                        btn.classList.add("multiple"); btn.innerText = matches.length + " Gönderi";
                        btn.onclick = function() { openPostModal(targetDate, matches); };
                    }
                    cell.appendChild(btn);
                }
                grid.appendChild(cell);
            }

            monthWrapper.appendChild(grid);
            viewport.appendChild(monthWrapper);
            
            m++; 
            if (m > 11) { m = 0; y++; }
        }
    }

    // 🎯 CRITICAL NEW ENGINE: MODAL İÇİ FASET FİLTRE HESAPLAMA VE GİZLEME MOTORU
    function updateModalTagsFacet() {
        const searchVal = document.getElementById("tag-search").value.toLowerCase();
        
        // 1. Mevcut aktif filtrelere göre alt veri kümesini süz
        const activeSubset = rawData.filter(function(item) {
            if (selectedTags.length > 0) {
                return selectedTags.every(function(t) { return item.t.includes(t); });
            }
            return true;
        });

        // 2. Bu aktif alt kümedeki etiket yoğunluğunu hesapla
        const dynamicCounts = {};
        activeSubset.forEach(function(item) {
            item.t.forEach(function(tag) {
                dynamicCounts[tag] = (dynamicCounts[tag] || 0) + 1;
            });
        });

        // 3. Mevcut modal butonlarını tara, metinlerini güncelle ve 0 olanları ele
        const buttons = document.querySelectorAll(".modal-tag-btn");
        buttons.forEach(function(btn) {
            const tag = btn.dataset.tag;
            const count = dynamicCounts[tag] || 0;
            const isSelected = selectedTags.includes(tag);

            // Buton üzerindeki metni anlık alt küme sayısıyla güncelle
            btn.innerText = "#" + tag + " (" + count + ")";

            if (isSelected) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }

            // Arama filtresi kontrolü
            const matchesSearch = btn.innerText.toLowerCase().includes(searchVal);
            // Faset kontrolü: Ya gönderi sayısı > 0 olmalı ya da o etiket halihazırda seçilmiş olmalı (geri kaldırabilmek için)
            const isVisibleByFacet = (count > 0) || isSelected;

            if (matchesSearch && isVisibleByFacet) {
                btn.style.display = "";
            } else {
                btn.style.display = "none";
            }
        });
    }

    function updateActiveTagBadges() {
        const container = document.getElementById("active-tags-container");
        container.innerHTML = "";
        selectedTags.forEach(function(tag) {
            let chip = document.createElement("span"); chip.className = "tag-chip"; chip.innerText = "#" + tag + " ";
            let removeBtn = document.createElement("span"); removeBtn.className = "remove-btn"; removeBtn.innerHTML = "&times;";
            removeBtn.onclick = function() { removeTagFromFilter(tag); };
            chip.appendChild(removeBtn); container.appendChild(chip);
        });
    }

    function removeTagFromFilter(tag) {
        selectedTags = selectedTags.filter(function(t) { return t !== tag; });
        updateActiveTagBadges(); 
        renderContinuousMatrix();
        
        // Eğer modal o esnada açıksa faset butonları anlık tazele
        const modalEl = document.getElementById("tagModal");
        if (modalEl && modalEl.style.display === "flex") {
            updateModalTagsFacet();
        }
    }

    function openPostModal(dateStr, posts) { 
        const dateParts = dateStr.split("-"); 
        document.getElementById("modal-date-title").innerText = dateParts[2] + " " + monthsTr[parseInt(dateParts[1])-1] + " " + dateParts[0]; 
        const container = document.getElementById("modal-links"); container.innerHTML = ""; 
        posts.forEach(function(post, index) { 
            let a = document.createElement("a"); a.className = "x-link-btn"; a.href = post.u; a.target = "_blank"; a.innerHTML = "🔗 Gönderi " + (index + 1) + " (𝕏'te Aç)"; container.appendChild(a); 
        }); 
        document.getElementById("postModal").style.display = "flex"; 
    }
    
    function closeModal() { document.getElementById("postModal").style.display = "none"; }
    
    function openTagModal() {
        const container = document.getElementById("tag-container"); 
        container.innerHTML = ""; 
        document.getElementById("tag-search").value = "";

        // Temiz DOM iskeleti kurulumu
        availableTags.forEach(function(tag) {
            let b = document.createElement("button"); 
            b.className = "modal-tag-btn"; 
            b.dataset.tag = tag;
            
            b.onclick = function() {
                if (selectedTags.includes(tag)) {
                    selectedTags = selectedTags.filter(function(t) { return t !== tag; });
                } else {
                    selectedTags.push(tag);
                }
                updateActiveTagBadges(); 
                renderContinuousMatrix();
                updateModalTagsFacet(); // Havuz içindeki her seçimde faseti tetikle
            };
            container.appendChild(b);
        });
        
        updateModalTagsFacet(); // Panel açılışında faset motorunu ateşle
        document.getElementById("tagModal").style.display = "flex";
    }

    function filterTagsInModal() { 
        updateModalTagsFacet(); // Arama kutusuna yazıldığında faseti reaktif olarak çağır
    }
    
    function closeTagModal() { document.getElementById("tagModal").style.display = "none"; }
    
    function clearTagFilter() { 
        selectedTags = []; 
        updateActiveTagBadges(); 
        const buttons = document.querySelectorAll(".modal-tag-btn");
        buttons.forEach(function(btn) { btn.classList.remove('active'); });
        closeTagModal(); 
        renderContinuousMatrix(); 
    }
    
    window.onclick = function(event) { 
        if (event.target == document.getElementById("postModal")) { closeModal(); } 
        if (event.target == document.getElementById("tagModal")) { closeTagModal(); } 
    }
    
    renderContinuousMatrix();
</script>
